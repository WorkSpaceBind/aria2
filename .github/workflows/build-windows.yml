name: Build Windows aria2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    # 安装 vcpkg（aria2 依赖库）
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat

    # 安装 aria2 编译依赖
    - name: Install dependencies
      run: |
        C:\vcpkg\vcpkg install openssl:x64-windows zlib:x64-windows c-ares:x64-windows libssh2:x64-windows

    # 配置 CMake 并生成 VS 工程
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

    # 编译 Release
    - name: Build Release
      run: |
        cd build
        cmake --build . --config Release
