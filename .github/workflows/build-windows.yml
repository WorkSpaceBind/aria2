name: Build Windows aria2

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-c-ares
          mingw-w64-x86_64-libssh2
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-gettext
          autoconf
          automake
          libtool
          pkgconf
    - name: Generate configure
      shell: msys2 {0}
      run: |
        ./mingw-config

    - name: Configure
      shell: msys2 {0}
      run: |
        ./configure \
          --disable-shared \
          --enable-static \
          --with-openssl \
          --without-gnutls

      env:
        PKG_CONFIG_PATH: /mingw64/lib/pkgconfig

    - name: Build
      shell: msys2 {0}
      run: |
        make -j4

    - name: Show output
      shell: msys2 {0}
      run: |
        ls -la src/
        file src/aria2c.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows
        path: src/aria2c.exe
        
