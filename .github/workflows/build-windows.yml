name: Build Windows aria2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    # 1️⃣ 检出源码
    - uses: actions/checkout@v3
    - name: Show repo files
      run: cmd /c "dir /s"
    # 2️⃣ 安装 vcpkg
    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat

    # 3️⃣ 安装 aria2 依赖
    - name: Install dependencies
      run: |
        C:\vcpkg\vcpkg install openssl:x64-windows zlib:x64-windows c-ares:x64-windows libssh2:x64-windows

    # 4️⃣ 修改最大连接数
    - name: Patch max connections
      run: |
        powershell -Command "(gc src\OptionHandlerImpl.cc) -replace '16', '256' | Out-File src\OptionHandlerImpl.cc -Encoding UTF8"

    # 5️⃣ 配置 CMake 并生成 VS 工程
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

    # 6️⃣ 编译 Release
    - name: Build Release
      run: |
        cd build
        cmake --build . --config Release
    - name: Show build output
      run: dir build
    # 7️⃣ 上传 exe 作为 artifact
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-256threads
        path: build/Release/aria2c.exe
